<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Modi - Mobile</title>
<style>
body{
    margin:0;
    text-align:center;
    background:#70c5ce;
    font-family:Arial;
    overflow:hidden;
}

canvas{
    background:#70c5ce;
    display:block;
    margin:0 auto;
    border:2px solid #000;
    touch-action: manipulation; /* prevent default scrolling on touch */
}

h1{
    color:white;
    font-size:24px;
}
p{
    font-size:18px;
}
</style>
</head>

<body>

<h1>Flappy Modi 😄</h1>
<canvas id="gameCanvas"></canvas>
<p>Tap or Press SPACE to Jump</p>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Make canvas responsive
canvas.width = Math.min(window.innerWidth - 20, 400);
canvas.height = Math.min(window.innerHeight - 100, 500);

// Load Modi image
let modiImg = new Image();
modiImg.src = "modi.png"; // same folder

// Fail sound
let failSound = new Audio("fail.mp3"); // same folder

let bird = {
    x: 60,
    y: 200,
    size: 45,
    gravity: 0.4,
    lift: -8,
    velocity: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let gameOver = false;

// Draw the bird (Modi)
function drawBird(){
    ctx.drawImage(modiImg, bird.x, bird.y, bird.size, bird.size);
}

// Draw pipes
function drawPipes(){
    ctx.fillStyle = "green";
    pipes.forEach(pipe=>{
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
    });
}

// Update pipes
function updatePipes(){
    if(frame % 120 === 0){
        let topHeight = Math.random() * 150 + 80;
        let gap = 170;
        pipes.push({
            x: canvas.width,
            width: 50,
            top: topHeight,
            bottom: canvas.height - topHeight - gap
        });
    }

    pipes.forEach(pipe=>{
        pipe.x -= 1.5;

        if(
            bird.x < pipe.x + pipe.width &&
            bird.x + bird.size > pipe.x &&
            (bird.y < pipe.top || bird.y + bird.size > canvas.height - pipe.bottom)
        ){
            triggerGameOver();
        }

        if(pipe.x + pipe.width === bird.x){
            score++;
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

// Update bird
function updateBird(){
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if(bird.y + bird.size > canvas.height){
        bird.y = canvas.height - bird.size;
        triggerGameOver();
    }

    if(bird.y < 0){
        bird.y = 0;
        bird.velocity = 0;
    }
}

// Draw score
function drawScore(){
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, 10, 30);
}

// Trigger game over (only play fail sound)
function triggerGameOver(){
    if(!gameOver){
        gameOver = true;
        failSound.play();
    }
}

// Game loop
function gameLoop(){
    if(gameOver){
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over 😄", 90, 250);
        ctx.font = "20px Arial";
        ctx.fillText("Refresh to Restart", 120, 290);
        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBird();
    drawPipes();
    updateBird();
    updatePipes();
    drawScore();

    frame++;
    requestAnimationFrame(gameLoop);
}

// Controls: Space key
document.addEventListener("keydown", function(e){
    if(e.code === "Space"){
        bird.velocity = bird.lift;
    }
});

// Controls: Mobile touch
canvas.addEventListener("touchstart", function(e){
    bird.velocity = bird.lift;
    e.preventDefault(); // prevent scrolling
});

// Start game
gameLoop();
</script>

</body>
</html>
